<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        input[readonly] {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .error-message {
            color: red;
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: green;
            font-size: 1.1em;
            text-align: center;
            padding: 15px;
            background-color: #f0f9f0;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background-color: #667eea;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-reset {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-reset:hover {
            background-color: #d0d0d0;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #5568d3;
            text-decoration: underline;
        }

        input.invalid {
            border-color: red !important;
            background-color: #ffe6e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Event Registration</h1>

        <div class="success-message" id="successMessage"></div>

        <form id="registrationForm">
            <!-- Participant Name -->
            <div class="form-group">
                <label for="participantName">Participant Name *</label>
                <input type="text" id="participantName" name="participantName" placeholder="Enter your full name">
                <div class="error-message" id="nameError"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address">
                <div class="error-message" id="emailError"></div>
            </div>

            <!-- Event Name (Read-only) -->
            <div class="form-group">
                <label for="eventName">Event Name *</label>
                <input type="text" id="eventName" name="eventName" readonly placeholder="Event will be auto-filled">
                <div class="error-message" id="eventError"></div>
            </div>

            <!-- Mobile Number -->
            <div class="form-group">
                <label for="mobileNumber">Mobile Number *</label>
                <input type="text" id="mobileNumber" name="mobileNumber" placeholder="Enter 10-digit mobile number">
                <div class="error-message" id="mobileError"></div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">Submit</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>
        </form>

        <a href="index.html" class="back-link">← Back to Events</a>
    </div>

    <script>
        $(document).ready(function() {
            // Get event name from URL query parameter
            function getEventNameFromURL() {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get('event');
            }

            // Set event name from URL
            let eventName = getEventNameFromURL();
            if (eventName) {
                $('#eventName').val(decodeURIComponent(eventName));
            }

            // Reset button functionality - clear all fields and messages
            $('.btn-reset').click(function() {
                $('#registrationForm')[0].reset();
                $('#eventName').val(eventName); // Keep the event name
                $('.error-message').hide();
                $('#successMessage').hide();
                $('input[type="text"], input[type="email"]').removeClass('invalid');
                $('.btn-submit').prop('disabled', false).text('Submit');
            });

            // Form submission
            $('#registrationForm').submit(function(e) {
                e.preventDefault();

                // Clear all previous error messages
                $('.error-message').hide();
                $('input[type="text"], input[type="email"]').removeClass('invalid');
                $('#successMessage').hide();

                // Get form values
                let participantName = $('#participantName').val().trim();
                let email = $('#email').val().trim();
                let eventNameValue = $('#eventName').val().trim();
                let mobileNumber = $('#mobileNumber').val().trim();

                let isValid = true;

                // Validate Participant Name
                if (participantName === "") {
                    $('#nameError').text('Participant Name is required').show();
                    $('#participantName').addClass('invalid');
                    isValid = false;
                }

                // Validate Event Name
                if (eventNameValue === "") {
                    $('#eventError').text('Event Name is required').show();
                    isValid = false;
                }

                // Validate Email
                let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (email === "") {
                    $('#emailError').text('Email is required').show();
                    $('#email').addClass('invalid');
                    isValid = false;
                } else if (!emailRegex.test(email)) {
                    $('#emailError').text('Please enter a valid email address').show();
                    $('#email').addClass('invalid');
                    isValid = false;
                }

                // Validate Mobile Number
                let mobileRegex = /^[0-9]+$/;
                if (mobileNumber === "") {
                    $('#mobileError').text('Mobile Number is required').show();
                    $('#mobileNumber').addClass('invalid');
                    isValid = false;
                } else if (!mobileRegex.test(mobileNumber)) {
                    $('#mobileError').text('Mobile Number should contain only digits').show();
                    $('#mobileNumber').addClass('invalid');
                    isValid = false;
                } else if (mobileNumber.length < 10) {
                    $('#mobileError').text('Mobile Number should be at least 10 digits').show();
                    $('#mobileNumber').addClass('invalid');
                    isValid = false;
                }

                // If all fields are valid
                if (isValid) {
                    // Display success message in green
                    $('#successMessage')
                        .css('color', 'green')
                        .css('background-color', '#e6f9e6')
                        .css('border', '2px solid green')
                        .text('✓ Registration Successful for ' + participantName)
                        .show();

                    // Disable submit button and change text
                    $('.btn-submit').prop('disabled', true).text('Registered');

                    // Optional: Clear form after successful submission
                    setTimeout(function() {
                        // Keep form values for confirmation but disable interaction if needed
                    }, 2000);
                }
            });
        });
    </script>
</body>
</html>
